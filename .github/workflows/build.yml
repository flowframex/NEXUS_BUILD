name: Build NEXUS (sm_21 Fermi GT 730)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-fermi-sm21:
    name: "NEXUS sm_21 | CUDA 8.0 | Windows 2022"
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # Jimver's action has CUDA 8.0.61 as an active entry in its
      # windows-links.ts using the correct NVIDIA redirect URL format:
      # developer.nvidia.com/.../cuda_8.0.61_win10-exe  (note: -exe suffix)
      # This is different from the .exe filename we were trying before.
      - name: Install CUDA 8.0.61
        uses: Jimver/cuda-toolkit@v0.2.29
        id: cuda-toolkit
        with:
          cuda: '8.0.61'
          method: 'local'

      # CUDA 8.0 host_config.h has a hard #error rejecting cl.exe > VS2015.
      # VS 2022 (on runner) = MSC_VER 1930+, VS 2015 = 1900.
      # Patch that one block so VS 2022 is accepted.
      - name: Patch host_config.h (allow VS 2022 cl.exe)
        shell: powershell
        run: |
          $f = "${{steps.cuda-toolkit.outputs.CUDA_PATH}}\include\host_config.h"
          if (-not (Test-Path $f)) {
            $f = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v8.0\include\host_config.h"
          }
          Write-Host "Patching: $f"
          $txt = Get-Content $f -Raw
          $txt = $txt -replace '(#if _MSC_VER > 1900\s*\r?\n\s*#error[^\r\n]*\r?\n\s*#endif)', '/* CI patch: MSC_VER upper-bound removed */'
          Set-Content $f $txt -NoNewline
          Write-Host "Patched OK."

      - name: Set up MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify nvcc + cl.exe
        shell: cmd
        run: |
          nvcc --version
          cl.exe 2>&1 | findstr /i "version"

      - name: Compile NEXUS (sm_21 Fermi)
        shell: cmd
        run: |
          nvcc ^
            -arch=sm_21 ^
            -O2 ^
            -Xcompiler /O2 ^
            -o NEXUS_sm21.exe ^
            NEXUS.cu ^
            -Xlinker /subsystem:windows

      - name: Upload NEXUS_sm21.exe
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-sm21-Fermi-GT730-Win64
          path: NEXUS_sm21.exe
          if-no-files-found: error
          retention-days: 90
