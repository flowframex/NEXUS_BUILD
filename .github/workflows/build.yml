name: Build NEXUS (sm_21 Fermi GT 730)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-fermi-sm21:
    name: "NEXUS sm_21 | CUDA 8.0 | Ubuntu"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA 8.0.61
        uses: Jimver/cuda-toolkit@v0.2.29
        id: cuda-toolkit
        with:
          cuda: '8.0.61'
          method: 'network'
          linux-local-args: '["--toolkit"]'

      - name: Verify nvcc
        run: nvcc --version

      - name: Compile NEXUS (sm_21 Fermi)
        run: |
          nvcc \
            -arch=sm_21 \
            -O2 \
            -Wno-deprecated-gpu-targets \
            -o NEXUS_sm21 \
            NEXUS.cu

      - name: Upload NEXUS_sm21
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-sm21-Fermi-GT730-Linux64
          path: NEXUS_sm21
          if-no-files-found: error
          retention-days: 90
