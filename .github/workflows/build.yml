name: Build NEXUS

on:
  push:
    branches: [ main, master ]
    paths:
      - 'NEXUS.cu'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'NEXUS.cu'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: CUDA x64 – Release
    runs-on: windows-2019

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC x64 developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.1        # VS 2017 (v141) — last toolset CUDA 8.0 tolerates with -allow-unsupported-compiler

      - name: Install CUDA 8.0 Toolkit
        shell: pwsh
        run: |
          # CUDA 8.0 Patch 2 — last release supporting Fermi CC2.1
          # Runtime requires driver >= 367.48 (well within GT 730 Fermi driver range)
          $url  = "https://developer.download.nvidia.com/compute/cuda/8.0/Prod2/local_installers/cuda_8.0.61_win10.exe"
          $dest = "$env:TEMP\cuda80.exe"
          Write-Host "Downloading CUDA 8.0 local installer..."
          (New-Object Net.WebClient).DownloadFile($url, $dest)
          Write-Host "Installing (compiler + runtime only)..."
          Start-Process -Wait -FilePath $dest -ArgumentList "-s","compiler_8.0","cudart_8.0"
          $cudaBin = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v8.0\bin"
          $cudaInc = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v8.0\include"
          echo $cudaBin                                        >> $env:GITHUB_PATH
          echo "CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v8.0" >> $env:GITHUB_ENV
          echo "CUDA_INC=$cudaInc"                            >> $env:GITHUB_ENV

      - name: Verify CUDA toolchain
        shell: pwsh
        run: |
          nvcc --version
          where.exe nvcc
          cl

      - name: Compile NEXUS.cu
        shell: cmd
        run: |
          nvcc ^
            -O2 ^
            -arch=sm_21 ^
            -cudart static ^
            -allow-unsupported-compiler ^
            -D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH ^
            NEXUS.cu ^
            -o NEXUS.exe ^
            -Xcompiler "/MT /EHsc /W3 /WX- /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH" ^
            -luser32 -lgdi32

      - name: Verify exe was produced
        shell: pwsh
        run: |
          if (!(Test-Path "NEXUS.exe")) {
            Write-Error "NEXUS.exe not found — compilation failed"
            exit 1
          }
          $item = Get-Item "NEXUS.exe"
          Write-Host "NEXUS.exe size: $($item.Length) bytes"
          $item | Select-Object Name, Length, LastWriteTime

      - name: Upload NEXUS.exe
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-x64-Release
          path: NEXUS.exe
          retention-days: 30
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download compiled exe
        uses: actions/download-artifact@v4
        with:
          name: NEXUS-x64-Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NEXUS.exe
          name: NEXUS SOVEREIGN ${{ github.ref_name }}
          body: |
            ## NEXUS SOVEREIGN ${{ github.ref_name }}

            **VRAM-native Frame Generation Engine**

            ### Requirements
            - Windows 10/11 (64-bit)
            - NVIDIA **Fermi or newer** GPU (GT 730 GF108 CC2.1 is the primary target)
            - NVIDIA driver **≥ 367.48**  (any driver from the last GT 730 Fermi era works)
            - Built with CUDA 8.0 targeting **sm_21** (Fermi CC2.1 native)

            > Kepler / Maxwell / Pascal / Turing / Ampere GPUs are also supported (CC2.1+ binary runs on all).
