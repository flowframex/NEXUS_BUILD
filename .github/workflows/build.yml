name: Build NEXUS

on:
  push:
    branches: [ main, master ]
    paths:
      - 'NEXUS.cu'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'NEXUS.cu'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: CUDA x64 – Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC x64 developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.17
        with:
          cuda: '10.2.89'

      - name: Verify CUDA toolchain
        shell: pwsh
        run: |
          nvcc --version
          where.exe nvcc
          cl

      - name: Compile NEXUS.cu
        shell: cmd
        run: |
          nvcc ^
            -O3 ^
            -gencode arch=compute_35,code=sm_35 ^
            -gencode arch=compute_35,code=compute_35 ^
            -cudart static ^
            -allow-unsupported-compiler ^
            -D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH ^
            -Wno-deprecated-gpu-targets ^
            NEXUS.cu ^
            -o NEXUS.exe ^
            -Xcompiler "/MT /EHsc /W3 /WX- /D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH" ^
            -luser32 -lgdi32

      - name: Verify exe was produced
        shell: pwsh
        run: |
          if (!(Test-Path "NEXUS.exe")) {
            Write-Error "NEXUS.exe not found — compilation failed"
            exit 1
          }
          $item = Get-Item "NEXUS.exe"
          Write-Host "NEXUS.exe size: $($item.Length) bytes"
          $item | Select-Object Name, Length, LastWriteTime

      - name: Upload NEXUS.exe
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-x64-Release
          path: NEXUS.exe
          retention-days: 30
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download compiled exe
        uses: actions/download-artifact@v4
        with:
          name: NEXUS-x64-Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NEXUS.exe
          name: NEXUS SOVEREIGN ${{ github.ref_name }}
          body: |
            ## NEXUS SOVEREIGN ${{ github.ref_name }}

            **VRAM-native Frame Generation Engine**

            ### Requirements
            - Windows OS
            - CUDA-compatible GPU (Kepler CC3.5+ — GT 730 GK208, GTX 650 and newer)
            - NVIDIA driver **≥ 441.22** (CUDA 10.2 runtime)
            - Built with CUDA 10.2 targeting sm_35 (native) + compute_35 PTX (JIT fallback)

            > **Note for true Fermi (CC2.1) GPUs:** You need a local build with CUDA 8.0 and `-arch=sm_21`.
