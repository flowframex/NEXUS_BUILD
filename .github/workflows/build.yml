# ================================================================
#  NEXUS v1.1 — GitHub Actions Build
#  Target : GT 730 FERMI  —  CC 2.1  —  sm_21
#  CUDA   : 8.0.61  (last version to support Fermi / sm_2x)
#  Host CC: MSVC v14.0  (VS 2015 — CUDA 8.0 max supported compiler)
#  OS     : Windows (GDI + WinMain — must compile on Windows runner)
#
#  WHY VS 2015?
#    CUDA 8.0 internally checks MSC_VER and rejects cl.exe >= 1910
#    (VS 2017+). The GitHub runner ships with VS 2022, so we install
#    VS 2015 C++ Build Tools via Chocolatey and point nvcc -ccbin at
#    that specific cl.exe. VS 2019/2022 headers/linker are NOT used.
#
#  NVIDIA CDN URL for CUDA 8.0 (no login required — public CDN):
#    developer.download.nvidia.com/compute/cuda/8.0/Prod2/...
# ================================================================

name: Build NEXUS  (sm_21 Fermi GT 730)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:       # Manual trigger from the Actions tab

jobs:
  build-fermi-sm21:
    name: "NEXUS → sm_21  |  CUDA 8.0  |  VS2015  |  Windows"
    runs-on: windows-2019  # Has Chocolatey + can host VS 2015 side-by-side

    steps:

      # ── 1. Get your source code ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install VS 2015 C++ Build Tools ──────────────────────
      #   CUDA 8.0 requires MSC_VER <= 1900 (VS 2015).
      #   vcbuildtools is the official Chocolatey package for it.
      #   /InstallSelectableItems: only the 64-bit native tools — no IDE.
      - name: Install VS 2015 C++ Build Tools  (via Chocolatey)
        shell: powershell
        run: |
          choco install vcbuildtools `
            --version=14.0.25420.1 `
            --params "'/InstallSelectableItems NativeCompilerX64'" `
            -y --no-progress

          # Confirm cl.exe landed where expected
          $cl = "C:\Program Files (x86)\Microsoft Visual Studio 14.0\VC\bin\amd64\cl.exe"
          if (-not (Test-Path $cl)) {
            Write-Error "VS 2015 cl.exe not found at: $cl"
            exit 1
          }
          Write-Host "VS 2015 cl.exe OK: $cl"

      # ── 3. Download CUDA 8.0.61 — Network Installer ─────────────
      #   Network installer (~30 MB) pulls only selected components.
      #   URL is on NVIDIA's public CDN — no developer account needed.
      - name: Download CUDA 8.0.61 network installer
        shell: powershell
        run: |
          $url = "https://developer.download.nvidia.com/compute/cuda/8.0/Prod2/network_installers/cuda_8.0.61_win10_network.exe"
          Write-Host "Downloading CUDA 8.0.61 from NVIDIA CDN..."
          Invoke-WebRequest -Uri $url -OutFile "cuda_installer.exe" -UseBasicParsing
          Write-Host "Done. Size: $([math]::Round((Get-Item cuda_installer.exe).Length/1MB,1)) MB"

      # ── 4. Silent-install CUDA 8.0 (compiler + runtime only) ────
      #   nvcc_8.0   — the CUDA compiler driver
      #   cudart_8.0 — CUDA runtime library (needed to link)
      #   Display driver / PhysX / GFE are intentionally skipped.
      #   Start-Process -Wait blocks until installer truly finishes.
      - name: Install CUDA 8.0  (nvcc + cudart, no driver)
        shell: powershell
        run: |
          Write-Host "Running CUDA 8.0 silent install..."
          $proc = Start-Process -FilePath ".\cuda_installer.exe" `
                    -ArgumentList "-s nvcc_8.0 cudart_8.0" `
                    -PassThru -Wait
          if ($proc.ExitCode -ne 0) {
            Write-Error "CUDA installer exited with code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "CUDA 8.0 install finished."

      # ── 5. Add CUDA 8.0 bin to PATH ──────────────────────────────
      - name: Add CUDA 8.0 to PATH
        shell: powershell
        run: |
          $cudaBin = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v8.0\bin"
          if (-not (Test-Path $cudaBin)) {
            Write-Error "CUDA bin not found: $cudaBin"
            exit 1
          }
          Add-Content -Path $env:GITHUB_PATH -Value $cudaBin
          Write-Host "Added to PATH: $cudaBin"

      # ── 6. Export VS 2015 environment (INCLUDE / LIB / PATH) ─────
      #   nvcc needs INCLUDE + LIB to find windows.h, gdi32.lib, etc.
      #   We call vcvarsall.bat and forward its vars into GITHUB_ENV.
      - name: Set up VS 2015 environment (INCLUDE / LIB / PATH)
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio 14.0\VC\vcvarsall.bat" amd64
          echo INCLUDE=%INCLUDE%>> %GITHUB_ENV%
          echo LIB=%LIB%>> %GITHUB_ENV%
          echo PATH=%PATH%>> %GITHUB_ENV%

      # ── 7. Sanity-check the toolchain ────────────────────────────
      - name: Verify nvcc + cl.exe
        shell: cmd
        run: |
          nvcc --version
          "C:\Program Files (x86)\Microsoft Visual Studio 14.0\VC\bin\amd64\cl.exe" 2>&1 | findstr /i "version"

      # ── 8. Compile NEXUS.cu ──────────────────────────────────────
      #   -arch=sm_21          Fermi Compute Capability 2.1 (GT 730)
      #   -O2                  device-side optimisation
      #   -Xcompiler /O2       host-side opt via cl.exe
      #   -ccbin               pin to VS 2015 cl.exe — CUDA 8.0 won't
      #                        accept VS 2017+ so this is mandatory
      #   -Xlinker /subsystem:windows   WIN32 GUI app (no console)
      #   GDI32/USER32/KERNEL32 are auto-linked by MSVC on Windows
      - name: Compile NEXUS  (sm_21  Fermi)
        shell: cmd
        run: |
          set "CCBIN=C:\Program Files (x86)\Microsoft Visual Studio 14.0\VC\bin\amd64\cl.exe"
          nvcc ^
            -arch=sm_21 ^
            -O2 ^
            -Xcompiler /O2 ^
            -ccbin "%CCBIN%" ^
            -o NEXUS_sm21.exe ^
            NEXUS.cu ^
            -Xlinker /subsystem:windows

      # ── 9. Upload the .exe ───────────────────────────────────────
      - name: Upload NEXUS_sm21.exe
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-sm21-Fermi-GT730-Win64
          path: NEXUS_sm21.exe
          if-no-files-found: error
          retention-days: 90
