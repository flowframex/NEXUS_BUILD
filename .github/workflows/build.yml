name: Build NEXUS (sm_21 Fermi GT 730)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: "NEXUS sm_21 | CUDA 8.0 | Docker"
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:8.0-devel-ubuntu16.04

    steps:
      - name: Install git
        run: apt-get update -y && apt-get install -y git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile NEXUS
        run: |
          nvcc -arch=sm_21 -O2 -Wno-deprecated-gpu-targets -o NEXUS_sm21 NEXUS.cu

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-sm21-Fermi-GT730-Linux64
          path: NEXUS_sm21
          if-no-files-found: error
          retention-days: 90
